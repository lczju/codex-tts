<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TTS 实验工作台</title>
    <link rel="stylesheet" href="./assets/css/app.css">
  </head>
  <body>
    <div class="page-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">TTS</span>
          <div>
            <p class="eyebrow">Single Entry</p>
            <h1>实验工作台</h1>
          </div>
        </div>

        <p class="sidebar-copy">
          一个入口同时承载试听、数据集说明和 benchmark 占位结果，避免页面、脚本和数据各自维护一份历史。
        </p>

        <nav class="sidebar-nav" aria-label="页面分区">
          <a class="nav-link" href="#listenSection">试听工作台</a>
          <a class="nav-link" href="#datasetSection">数据集说明</a>
          <a class="nav-link" href="#benchmarkSection">Benchmark</a>
        </nav>

        <section class="sidebar-panel">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Raw Samples</p>
              <h2>当前批次</h2>
            </div>
            <p id="sampleCount" class="panel-meta">0 条样本</p>
          </div>
          <div id="datasetBrief" class="panel-body"></div>
        </section>

        <div id="loadNote" class="load-note is-hidden" role="status" aria-live="polite"></div>
      </aside>

      <main class="main">
        <section id="listenSection" class="content-section">
          <header class="section-header">
            <div>
              <p class="eyebrow">Listen First</p>
              <h2>试听工作台</h2>
            </div>
          </header>

          <div class="listen-grid">
            <article class="panel hero-panel">
              <div id="sampleDetail"></div>
            </article>

            <article class="panel compact-panel">
              <div class="panel-heading">
                <div>
                  <p class="eyebrow">Spectrogram</p>
                  <h3>频谱图</h3>
                </div>
              </div>
              <div id="spectrogramPanel" class="panel-body"></div>
            </article>
          </div>

          <article class="panel">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Sample List</p>
                <h3>切换样本</h3>
              </div>
            </div>
            <div id="sampleList" class="sample-list" role="listbox" aria-label="原始样本列表"></div>
          </article>
        </section>

        <section id="datasetSection" class="content-section">
          <header class="section-header">
            <div>
              <p class="eyebrow">Dataset Overview</p>
              <h2>数据集说明</h2>
            </div>
          </header>
          <article class="panel">
            <div id="datasetOverview" class="stack-block"></div>
          </article>
        </section>

        <section id="benchmarkSection" class="content-section">
          <header class="section-header">
            <div>
              <p class="eyebrow">Benchmark</p>
              <h2>模型结果占位</h2>
            </div>
          </header>
          <article class="panel">
            <div id="benchmarkResults" class="stack-block"></div>
          </article>
        </section>
      </main>
    </div>

    <script src="./assets/js/app.js"></script>
  </body>
</html>
