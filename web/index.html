<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TTS 原始音频工作台</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">RAW</span>
          <div>
            <p class="eyebrow">Listen First</p>
            <h1>原始音频试听台</h1>
          </div>
        </div>

        <p class="sidebar-intro">先听音频，再快速切换样本。首页只保留试听所需的信息。</p>

        <a class="nav-link" href="./dataset.html">进入数据集页面</a>

        <section class="sidebar-section">
          <div class="section-heading">
            <h2>当前批次</h2>
            <p>简要摘要</p>
          </div>
          <div id="datasetBrief" class="info-card">
            <p class="empty-copy">等待加载原始样本数据。</p>
          </div>
        </section>

        <div id="modelPlaceholders" class="is-hidden" aria-hidden="true"></div>
      </aside>

      <main class="main">
        <header class="main-header">
          <div>
            <p class="eyebrow">Raw Audio</p>
            <h2>当前试听样本</h2>
            <p class="header-copy">聚焦文本、播放器和频谱图，其余维护信息不在首页展开。</p>
          </div>
          <div class="header-actions">
            <div id="loadNote" class="load-note is-hidden" role="status" aria-live="polite"></div>
          </div>
        </header>

        <section class="hero-grid">
          <article class="panel hero-panel">
            <div id="sampleDetail"></div>
          </article>

          <article class="panel mini-panel">
            <div class="panel-header">
              <div>
                <p class="eyebrow">Spectrogram</p>
                <h3>频谱图</h3>
              </div>
            </div>
            <div id="spectrogramPanel" class="panel-body"></div>
          </article>
        </section>

        <section class="panel sample-list-panel">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Sample List</p>
              <h3>切换样本</h3>
            </div>
            <p id="sampleCount" class="panel-meta">0 条样本</p>
          </div>
          <div id="sampleList" class="sample-list" role="listbox" aria-label="原始样本列表"></div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
